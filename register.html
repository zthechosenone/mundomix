<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - MUNDOMIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --bg: #fafaf9;
            --text: #1c1917;
            --text-light: #78716c;
            --border: #e7e5e4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #fafaf9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-circle {
            width: 80px;
            height: 80px;
            border: 2px solid #d6d3d1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        
        .logo-mm {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--primary);
            font-weight: 600;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .terms {
            font-size: 13px;
            color: var(--text-light);
            margin: 20px 0;
            line-height: 1.5;
        }
        
        .terms a {
            color: var(--primary);
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            color: var(--text-light);
            font-size: 14px;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-light);
            text-decoration: none;
        }
        
        .success {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Volver a la tienda</a>
        
        <div class="logo">
            <div class="logo-circle">
                <span class="logo-mm">MM</span>
            </div>
            <h1>Crear Cuenta</h1>
        </div>
        
        <div class="success" id="successMessage"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Nombre *</label>
                    <input type="text" id="firstName" placeholder="Juan" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Apellido *</label>
                    <input type="text" id="lastName" placeholder="Pérez" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="juan@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Teléfono (opcional)</label>
                <input type="tel" id="phone" placeholder="099 123 456">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña *</label>
                <input type="password" id="confirmPassword" placeholder="Repetí tu contraseña" required>
            </div>
            
            <p class="terms">
                Al crear una cuenta, aceptás nuestros 
                <a href="#">Términos de Servicio</a> y 
                <a href="#">Política de Privacidad</a>.
            </p>
            
            <button type="submit" class="btn btn-primary" id="registerBtn">
                Crear Cuenta Gratis
            </button>
        </form>
        
        <div class="footer">
            ¿Ya tenés cuenta? <a href="/login">Iniciá sesión</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Las contraseñas no coinciden');
                return;
            }
            
            document.getElementById('successMessage').textContent = '¡Cuenta creada! Ahora podés iniciar sesión.';
            document.getElementById('successMessage').classList.add('show');
            
            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
        });
    </script>
</body>
</html>
